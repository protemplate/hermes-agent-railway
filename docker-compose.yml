services:
  hermes:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: changeme
      SEARXNG_URL: http://searxng:8080
    volumes:
      - hermes-data:/data
    depends_on:
      - searxng

  searxng:
    image: docker.io/searxng/searxng:latest
    environment:
      PORT: 8080
      BASE_URL: http://localhost:8081
    ports:
      - "8081:8080"

volumes:
  hermes-data:
