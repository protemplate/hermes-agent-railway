services:
  hermes:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      ADMIN_PASSWORD: changeme
      SEARXNG_URL: http://searxng:8080
      # Set START_GATEWAY=true to also run `hermes gateway run --replace`
      # in the background (Telegram/Discord/Slack/email bridges).
      # START_GATEWAY: "true"
    volumes:
      - hermes-data:/data
    depends_on:
      - searxng

  searxng:
    image: docker.io/searxng/searxng:latest
    environment:
      PORT: 8080
      BASE_URL: http://localhost:8081
    ports:
      - "8081:8080"

volumes:
  hermes-data:
