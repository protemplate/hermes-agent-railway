<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{TITLE}}</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css">
  </head>
  <body>
    <main class="shell">
      <header class="hero">
        <div>
          <p class="eyebrow">Railway template</p>
          <h1>{{TITLE}}</h1>
        </div>
        {{NAV}}
      </header>
      <section class="panel">
        <p class="muted">{{INTRO}}</p>
        <div id="term" class="terminal-container"></div>
      </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-web-links@0.9.0/lib/xterm-addon-web-links.js"></script>
    <script>
      (function () {
        const term = new Terminal({
          cursorBlink: true,
          fontFamily: 'SFMono-Regular, Consolas, Liberation Mono, monospace',
          fontSize: 13,
          theme: { background: '#05070b' },
          convertEol: true,
        });
        const fit = new FitAddon.FitAddon();
        term.loadAddon(fit);
        term.loadAddon(new WebLinksAddon.WebLinksAddon());
        const host = document.getElementById('term');
        term.open(host);
        try { fit.fit(); } catch (_) {}

        const wsUrl = (location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host + '{{WS_PATH}}';
        let ws;
        function connect() {
          ws = new WebSocket(wsUrl);
          ws.addEventListener('open', () => {
            term.writeln('\x1b[32m[connected]\x1b[0m');
            sendResize();
          });
          ws.addEventListener('message', (ev) => {
            try {
              const msg = JSON.parse(ev.data);
              if (msg.type === 'output') term.write(msg.data);
              else if (msg.type === 'exit') {
                term.writeln('\r\n\x1b[33m[process exited' + (typeof msg.code === 'number' ? ' code=' + msg.code : '') + ']\x1b[0m');
              }
            } catch (_) { term.write(ev.data); }
          });
          ws.addEventListener('close', () => {
            term.writeln('\r\n\x1b[31m[disconnected]\x1b[0m');
          });
          ws.addEventListener('error', () => {
            term.writeln('\r\n\x1b[31m[connection error]\x1b[0m');
          });
        }

        function sendResize() {
          if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
          }
        }

        term.onData((data) => {
          if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: 'input', data }));
          }
        });

        const ro = new ResizeObserver(() => {
          try { fit.fit(); sendResize(); } catch (_) {}
        });
        ro.observe(host);

        connect();
      })();
    </script>
  </body>
</html>
